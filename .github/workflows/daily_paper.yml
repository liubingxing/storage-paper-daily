name: 📄 每日论文精读

on:
  schedule:
    # 每天北京时间早上 8:00 运行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-daily-paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily paper analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          API_MODEL: ${{ secrets.API_MODEL }}
        run: python scripts/generate_daily.py

      - name: Read paper metadata
        id: meta
        run: |
          if [ -f paper_metadata.txt ]; then
            PAPER_TITLE=$(grep '^PAPER_TITLE=' paper_metadata.txt | cut -d= -f2-)
            PAPER_CONF=$(grep '^PAPER_CONF=' paper_metadata.txt | cut -d= -f2-)
            PAPER_TAGS=$(grep '^PAPER_TAGS=' paper_metadata.txt | cut -d= -f2-)
            echo "title=$PAPER_TITLE" >> $GITHUB_OUTPUT
            echo "conf=$PAPER_CONF" >> $GITHUB_OUTPUT
            echo "tags=$PAPER_TAGS" >> $GITHUB_OUTPUT
            rm paper_metadata.txt
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "📄 ${{ steps.meta.outputs.conf }} - ${{ steps.meta.outputs.title }}"
          title: "📄 [${{ steps.meta.outputs.conf }}] ${{ steps.meta.outputs.title }}"
          body: |
            ## 📄 ${{ steps.meta.outputs.title }}

            - **会议**: ${{ steps.meta.outputs.conf }}
            - **标签**: ${{ steps.meta.outputs.tags }}

            ---

            请 review 论文分析内容，然后 merge。
            Merge 后会自动部署到 GitHub Pages。
          branch: daily-paper/${{ github.run_id }}
          labels: paper-reading
